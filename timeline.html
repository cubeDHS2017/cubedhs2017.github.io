<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html" class="normal-link">$ cd /timeline</a>
    </nav>
    <div class="timeline-container">
        <div class="timeline">
            <div class="timeline-item">
                <div class="timeline-date">2024</div>
                <div class="timeline-content">
                    <h3>Started a New Project</h3>
                    <p>Worked on a new project involving health metrics tracking.</p>
                </div>
            </div>

            <div class="timeline-item">
                <div class="timeline-date">2023</div>
                <div class="timeline-content">
                    <h3>Graduated High School</h3>
                    <p>Successfully completed my senior year and graduated with honors.</p>
                </div>
            </div>

            <div class="timeline-item">
                <div class="timeline-date">2022</div>
                <div class="timeline-content">
                    <h3>Started Running</h3>
                    <p>Developed a passion for running and began training for long-distance races.</p>
                </div>
            </div>

            <!-- Add more timeline items as needed -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
